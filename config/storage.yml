test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

storj:
  service: S3
  access_key_id: <%= ENV['STORJ_ACCESS_KEY'] %>
  secret_access_key: <%= ENV['STORJ_SECRET_KEY'] %>
  endpoint: <%= ENV['STORJ_ENDPOINT'] %>
  bucket: <%= ENV['STORJ_BUCKET'] %>
  region: us-east-1
  force_path_style: true